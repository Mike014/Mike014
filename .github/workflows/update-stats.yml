name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate Top Languages Card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=Mike014&layout=compact&theme=dark&langs_count=8&hide=jupyter%20notebook" -o top-langs.svg

      - name: Commit SVG
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add top-langs.svg
          git diff --staged --quiet || git commit -m "Update top languages card"
          git push
